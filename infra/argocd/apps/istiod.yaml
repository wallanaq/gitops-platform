apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Upstream Helm chart
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: istiod
      targetRevision: 1.29.1
      helm:
        valueFiles:
          - $values/infra/istio/istiod/values.yaml
    # values.yaml from Git
    - repoURL: https://github.com/wallanaq/gitops-platform.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  # istiod dynamically injects caBundle into ValidatingWebhookConfigurations at runtime.
  # Ignoring this field prevents a permanent OutOfSync caused by live cluster state.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
