apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  # Prevent ArgoCD from deleting the CRDs when the Application is removed
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Upstream Helm chart
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: base
      targetRevision: 1.29.1
      helm:
        valueFiles:
          - $values/infra/istio/base/values.yaml
    # values.yaml from Git
    - repoURL: https://github.com/wallanaq/gitops-platform.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  # istiod dynamically mutates ValidatingWebhookConfigurations at runtime (caBundle,
  # failurePolicy, etc.). Ignoring the entire webhooks field prevents a permanent
  # OutOfSync caused by live cluster state diverging from the Helm-rendered manifest.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
